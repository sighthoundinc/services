version: "2"

services:  
  sio:
  # TODO: Change to release image
    image: gcr.io/test-bai/sio:220921-ca10b574-r32.4.3-arm64v8
    restart: always
    volumes:
      - /data/sighthound/license/sighthound-license.json:/sighthound/sio/share/sighthound-license.json:ro
      - ./sio.json:/sio.json:ro
      - /data/sighthound/media:/data/sighthound/media:rw
      - /data/sighthound/.cache:/root/.sio/modelCache
    command: > 
      /sighthound/sio/bin/runPipelineSet /sio.json
    networks:
      - core_sighthound
      - sh-device-ui_sh-ui-net

networks:
  core_sighthound:
    external: true
  sh-device-ui_sh-ui-net:
    external: true